services:

  # ─── Infrastruktuuri ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: autoqad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-QA-results}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"   # 5432 varattuna natiivi-PostgreSQL:lle
    networks:
      - autoqad-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  orthanc:
    image: jodogne/orthanc-python
    container_name: autoqad-orthanc
    restart: unless-stopped
    ports:
      - "14242:4242"   # 4242 varattuna natiivi-Orthancille (DICOM C-STORE)
      - "18042:8042"   # 8042 varattuna natiivi-Orthancille (REST API)
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - ./grpc_microservices/Orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    networks:
      - autoqad-net

  # ─── Mikropalvelut (gRPC) ───────────────────────────────────────────────────

  fetch-service:
    build:
      context: ./grpc_microservices/Fetch_service
      dockerfile: Dockerfile.fetch
    container_name: autoqad-fetch
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-admin}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}
    depends_on:
      - orthanc
      - postgres
    networks:
      - autoqad-net

  us-analyze-service:
    build:
      context: ./grpc_microservices/Analyze_service
      dockerfile: Dockerfile.analyze
    container_name: autoqad-us-analyze
    restart: unless-stopped
    ports:
      - "50052:50052"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-QA-results}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-admin}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}
      FETCH_SERVICE_HOST: fetch-service:50051
    depends_on:
      postgres:
        condition: service_healthy
      fetch-service:
        condition: service_started
    networks:
      - autoqad-net

  xr-analyze-service:
    build:
      context: ./grpc_microservices/Xray_analyze_service
      dockerfile: Dockerfile
    container_name: autoqad-xr-analyze
    restart: unless-stopped
    ports:
      - "50053:50053"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-QA-results}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-admin}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autoqad-net

  ct-analyze-service:
    build:
      context: ./grpc_microservices/CT_analyze_service
      dockerfile: Dockerfile
    container_name: autoqad-ct-analyze
    restart: unless-stopped
    ports:
      - "50054:50054"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-QA-results}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-admin}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autoqad-net

  # ─── Portainer CE — Docker-hallintaportaali ────────────────────────────────

  portainer:
    image: portainer/portainer-ce:latest
    container_name: autoqad-portainer
    restart: unless-stopped
    command: --admin-password '$$2y$$05$$t.skMfFcMuGBn8T6YYYJzeOjKs3K/THLLtxjZD.FeDAdHe5R/2LoO'
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - autoqad-net

  # ─── Django-verkkosovellus ──────────────────────────────────────────────────
  # GPT-4o (OpenAI) ja Slack toimivat env-muuttujina tässä palvelussa
  # erillistä konttia ei tarvita

  django-web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: autoqad-django
    restart: unless-stopped
    ports:
      - "8001:8000"   # 8000 varattuna Django dev-serverille
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-prod}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-QA-results}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-admin}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}       # GPT-4o
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL} # Slack-ilmoitukset
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autoqad-net

networks:
  autoqad-net:
    driver: bridge

volumes:
  postgres_data:
  orthanc_data:
  portainer_data:
