apiVersion: apps/v1
kind: Deployment
metadata:
  name: xr-analyze-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xr-analyze-service
  template:
    metadata:
      labels:
        app: xr-analyze-service
    spec:
      containers:
      - name: xr-analyze-service
        image: skullervo/xr-analyze-service:latest
        ports:
        - containerPort: 50053
        env:
        - name: DATABASE_HOST
          value: "postgres"
        - name: DATABASE_PORT
          value: "5432"
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_DB
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD
        - name: ORTHANC_URL
          value: "http://orthanc:8042"
        - name: ORTHANC_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-credentials
              key: ORTHANC_USERNAME
        - name: ORTHANC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-credentials
              key: ORTHANC_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: xr-analyze-service
spec:
  type: ClusterIP
  selector:
    app: xr-analyze-service
  ports:
    - port: 50053
      targetPort: 50053
